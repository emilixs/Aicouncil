services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aicouncil}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aicouncil}
      POSTGRES_DB: ${POSTGRES_DB:-aicouncil}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aicouncil}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aicouncil}:${POSTGRES_PASSWORD:-aicouncil}@postgres:5432/${POSTGRES_DB:-aicouncil}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      WS_CORS_ORIGINS: ${WS_CORS_ORIGINS:-*}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
