services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ai_council
      POSTGRES_PASSWORD: ai_council_dev
      POSTGRES_DB: ai_council
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_council"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://ai_council:ai_council_dev@postgres:5432/ai_council
      NODE_ENV: development
      PORT: 3000
      JWT_SECRET: dev-secret-change-in-production
      WS_CORS_ORIGINS: "*"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: frontend/
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
